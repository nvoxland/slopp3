name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  uberjar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
            ~/.deps.clj
            ~/.clojure
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-
      - name: Build the uberjar from the pushed tree
        run: |
          clojure -Sdeps '{:deps {io.github.clojure/tools.build {:mvn/version "0.10.5"}} :paths ["."]}' \
            -M -e '((requiring-resolve (quote build/uber)) {:src "src"})'
      - name: Smoke it (jar-only classpath serves a fresh store)
        env:
          SLOPP_CLOJURE: clojure
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            | java -jar target/slopp.jar -m slopp.boot /tmp/smoke --snapshot | grep -q serverInfo
      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "slopp $GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" target/slopp.jar --repo "$GITHUB_REPOSITORY" --clobber
