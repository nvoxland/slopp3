name: test
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
      - name: Run the suite from the pushed files
        env:
          SLOPP_CLOJURE: clojure
        run: clojure -M:test
  test-via-slopp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
      - name: Import the pushed code into a slopp store (every write gated)
        env:
          SLOPP_CLOJURE: clojure
        run: |
          git branch -f main HEAD
          clojure -M -m slopp.sync clone "$PWD" /tmp/store
      - name: Run the store's suite (isolated tier, built from the store)
        env:
          SLOPP_CLOJURE: clojure
        run: clojure -M -m slopp.sync test /tmp/store
